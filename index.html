<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!-- Unlisted: reachable by link but not indexed by search engines. -->
<meta name="robots" content="noindex, nofollow" />
<title>Insulin Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%92%89</text></svg>" />
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  :root {
    --bg: #0f1419; --panel: #1a2029; --ink: #e6edf3; --muted: #8b98a5;
    --rapid: #4f9dff; --long: #ff8a5b; --accent: #ff5b7f; --tir: #5bd6a0;
    --line: #2a313c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  header { padding: 24px 28px 8px; }
  h1 { margin: 0; font-size: 22px; }
  .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .wrap { padding: 16px 28px 40px; max-width: 1100px; }
  .tabs { display: flex; gap: 8px; margin: 16px 0 20px; }
  .tab {
    background: var(--panel); color: var(--muted); border: 1px solid var(--line);
    padding: 8px 16px; border-radius: 999px; cursor: pointer; font-size: 14px;
  }
  .tab.active { color: var(--ink); border-color: var(--accent); background: #221820; }
  .hint { color: var(--muted); font-size: 12px; margin: -8px 0 4px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
  .card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 16px 18px;
  }
  .card .k { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  .card .v { font-size: 26px; font-weight: 600; margin-top: 6px; }
  .card .v small { font-size: 14px; color: var(--muted); font-weight: 400; }
  .chart {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 8px; margin-top: 16px;
  }
  #daily, #glucose, #gmi { height: 380px; }
  #hour { height: 300px; }

  @media (max-width: 600px) {
    header { padding: 16px 14px 6px; }
    h1 { font-size: 19px; }
    .wrap { padding: 10px 12px 32px; }
    .tabs { flex-wrap: wrap; gap: 6px; margin: 12px 0 10px; }
    .tab { padding: 7px 13px; font-size: 13px; }
    .cards { grid-template-columns: 1fr 1fr; gap: 8px; }
    .card { padding: 12px 13px; }
    .card .v { font-size: 21px; }
    .chart { padding: 4px; margin-top: 10px; }
    #daily, #glucose, #gmi { height: 320px; }
    #hour { height: 260px; }
  }
</style>
</head>
<body>
<header>
  <h1>Insulin usage</h1>
  <div class="sub" id="sub"></div>
</header>
<div class="wrap">
  <div class="tabs" id="tabs">
    <div class="tab" data-days="7">Past week</div>
    <div class="tab" data-days="30">Past month</div>
    <div class="tab" data-days="0">All time</div>
  </div>
  <div class="hint">Drag the slider under a chart, or pinch / scroll on it, to zoom the time range.
    On the glucose chart, <b>↑Nu</b> marks a basal increase — green if overnight glucose dropped after it, grey if not.</div>
  <div class="cards" id="cards"></div>
  <div class="chart" id="daily"></div>
  <div class="chart" id="glucose"></div>
  <div class="chart" id="gmi"></div>
  <div class="chart" id="hour"></div>
</div>

const GMI = mg => 3.31 + 0.02392 * mg;

gluDates.forEach((k, idx) => {
  const end = new Date(k + "T00:00:00");
  const startW = new Date(end); startW.setDate(startW.getDate() - (ROLL - 1));
  let sumMgN = 0, sumN = 0, sumIns = 0;
  for (let j = idx; j >= 0; j--) {
    if (new Date(gluDates[j] + "T00:00:00") < startW) break;

    sumMgN += g.mean * g.n; sumN += g.n;

  for (let dd = new Date(startW); dd <= end; dd.setDate(dd.getDate() + 1)) {
    sumIns += insByDate[dayKey(new Date(dd))] || 0;
  }

function windowStart(days) {
  if (days === 0) return firstEvent;
  const s = new Date(anchor); s.setDate(s.getDate() - days); return s;

    backgroundColor: "transparent",
    textStyle: { color: "#e6edf3" },
    tooltip: { trigger: "axis", axisPointer: { type: "shadow" } },
    legend: { data: ["rapid", "long", rollWin + "-day avg"], top: 4,
              textStyle: { color: "#8b98a5" } },
    grid: { left: 8, right: 12, top: 38, bottom: 56, containLabel: true },
    xAxis: Object.assign({ type: "category", data: dates }, AX),
    yAxis: Object.assign({ type: "value", name: "units" }, AX),
    dataZoom: [
      { type: "inside", start: zStart, end: 100 },
      { type: "slider", start: zStart, end: 100, height: 16, bottom: 14,
        borderColor: "#2a313c", fillerColor: "rgba(255,91,127,0.15)",
        handleStyle: { color: "#ff5b7f" }, textStyle: { color: "#8b98a5" } },
    ],
    series: [
      { name: "rapid", type: "bar", stack: "ins", data: rapidY, itemStyle: { color: C.rapid } },
      { name: "long", type: "bar", stack: "ins", data: longY, itemStyle: { color: C.long } },
      { name: rollWin + "-day avg", type: "line", data: rollY, smooth: true,
        symbol: "none", lineStyle: { color: C.roll, width: 2 } },
    ],
  }, true);

  // --- glucose context: daily mean + TIR, with 70-180 band ---
  const gMean = gDays.map(k => glucose[k].mean);
  const gTir = gDays.map(k => glucose[k].tir);
  // basal increases marked on the timeline; green = overnight glucose dropped
  const gLo = gDays[0], gHi = gDays[gDays.length - 1];
  const basalMarks = (DATA.basalSteps || [])
    .filter(b => gDays.length && b.date >= gLo && b.date <= gHi)
    .map(b => {
      const good = b.effect != null && b.effect < 0;
      const col = good ? C.tir : "#8b98a5";
      return { xAxis: b.date, lineStyle: { color: col },
        label: { formatter: "↑" + b.to_u + "u", color: col, fontSize: 9,
                 position: "insideEndTop" } };
    });
  cGlucose.setOption({
    backgroundColor: "transparent",
    textStyle: { color: "#e6edf3" },
    tooltip: { trigger: "axis" },
    legend: { data: ["mean glucose", "time in range"], top: 4,
              textStyle: { color: "#8b98a5" } },
    grid: { left: 8, right: 12, top: 38, bottom: 50, containLabel: true },
    xAxis: Object.assign({ type: "category", data: gDays }, AX),
    yAxis: [
      Object.assign({ type: "value", name: "mg/dL" }, AX),
      Object.assign({ type: "value", name: "TIR %", min: 0, max: 100, position: "right",
                      splitLine: { show: false } }, AX),
    ],
    dataZoom: [
      { type: "inside" },
      { type: "slider", height: 16, bottom: 12, borderColor: "#2a313c",
        fillerColor: "rgba(79,157,255,0.15)", handleStyle: { color: C.glu },
        textStyle: { color: "#8b98a5" } },
    ],
    series: [
      { name: "mean glucose", type: "line", data: gMean, smooth: true, symbol: "none",
        lineStyle: { color: C.glu, width: 2 },
        markArea: { silent: true, itemStyle: { color: "rgba(91,214,160,0.08)" },
                    data: [[{ yAxis: 70 }, { yAxis: 180 }]] },
        markLine: { silent: true, symbol: "none",
                    lineStyle: { type: "dashed", width: 1 }, data: basalMarks } },
      { name: "time in range", type: "line", yAxisIndex: 1, data: gTir, smooth: true,
        symbol: "none", lineStyle: { color: C.tir, width: 1.5, type: "dotted" } },
    ],
  }, true);

  // --- GMI / estimated A1C over time, with rolling insulin overlaid ---
  const gmiY = gDays.map(k => gmiByDate[k] ?? null);
  const insY = gDays.map(k => insRollByDate[k] ?? null);
  const lo = gDays[0], hi = gDays[gDays.length - 1];
  const labPts = (DATA.labA1c || [])
    .filter(l => gDays.length && l.date >= lo && l.date <= hi)
    .map(l => [l.date, l.a1c]);
  cGmi.setOption({
    backgroundColor: "transparent",
    textStyle: { color: "#e6edf3" },
    title: { text: "Est. A1C (GMI, 14-day) vs insulin", left: 8, top: 4,
             textStyle: { color: "#e6edf3", fontSize: 14, fontWeight: 500 } },
    tooltip: { trigger: "axis",
      valueFormatter: v => (v == null ? "—" : (+v).toFixed(2)) },
    legend: { data: ["est. A1C (GMI)", "lab A1C", "insulin u/day"], top: 4, right: 8,
              textStyle: { color: "#8b98a5" } },
    grid: { left: 8, right: 12, top: 40, bottom: 50, containLabel: true },
    xAxis: Object.assign({ type: "category", data: gDays }, AX),
    yAxis: [
      Object.assign({ type: "value", name: "A1C %", scale: true }, AX),
      Object.assign({ type: "value", name: "u/day", min: 0, position: "right",
                      splitLine: { show: false } }, AX),
    ],
    dataZoom: [
      { type: "inside" },
      { type: "slider", height: 16, bottom: 12, borderColor: "#2a313c",
        fillerColor: "rgba(255,138,91,0.15)", handleStyle: { color: C.long },
        textStyle: { color: "#8b98a5" } },
    ],
    series: [
      { name: "est. A1C (GMI)", type: "line", data: gmiY, smooth: true,
        symbol: "none", connectNulls: true, lineStyle: { color: C.tir, width: 2.5 },
        itemStyle: { color: C.tir } },
      { name: "lab A1C", type: "scatter", data: labPts, symbolSize: 11,
        itemStyle: { color: "#ffffff", borderColor: C.roll, borderWidth: 2 },
        tooltip: { valueFormatter: v => (+v).toFixed(1) + "% (lab)" } },
      { name: "insulin u/day", type: "line", yAxisIndex: 1, data: insY, smooth: true,
        symbol: "none", connectNulls: true, lineStyle: { color: C.long, width: 2 },
        areaStyle: { color: "rgba(255,138,91,0.10)" }, itemStyle: { color: C.long } },
    ],
  }, true);

  // --- doses by hour of day ---
  const byHour = new Array(24).fill(0);
  inWin.forEach(e => byHour[e.d.getHours()] += 1);
  cHour.setOption({
    backgroundColor: "transparent",
    textStyle: { color: "#e6edf3" },
    title: { text: "Doses by time of day", left: 8, top: 4,
             textStyle: { color: "#e6edf3", fontSize: 14, fontWeight: 500 } },
    tooltip: { trigger: "axis" },
    grid: { left: 8, right: 12, top: 40, bottom: 24, containLabel: true },
    xAxis: Object.assign({ type: "category", data: [...Array(24).keys()], name: "hour" }, AX),
    yAxis: Object.assign({ type: "value" }, AX),
    series: [{ type: "bar", data: byHour, itemStyle: { color: C.rapid } }],
  }, true);
}

const charts = [cDaily, cGlucose, cGmi, cHour];
const tabs = [...document.querySelectorAll(".tab")];
let currentDays = 30;
tabs.forEach(t => t.addEventListener("click", () => {
  tabs.forEach(x => x.classList.remove("active"));
  t.classList.add("active");
  currentDays = Number(t.dataset.days);
  render(currentDays);
}));
tabs[1].classList.add("active");
render(currentDays);

// Resize only on real width change; ignore height-only events (mobile address
// bar showing/hiding on scroll). Container heights are fixed in CSS, so this is
// just to re-flow on rotation / window resize.
let lastW = window.innerWidth;
let rt;
window.addEventListener("resize", () => {
  if (window.innerWidth === lastW) return;
  lastW = window.innerWidth;
  clearTimeout(rt);
  rt = setTimeout(() => charts.forEach(c => c.resize()), 150);
});
</script>
</body>
</html>
